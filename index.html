<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランダムポケモンカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 16px;
    padding: 24px;
    background: linear-gradient(135deg, #2a4ba0 0%, #5b7dd8 100%);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }

  h1 {
    color: #fff;
    text-shadow: 2px 2px 0 #1a2f60;
    font-size: 22px;
    letter-spacing: 2px;
    text-align: center;
  }

  /* === ボールエリア === */
  .ball-stage {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .ball-stage.locked { cursor: wait; pointer-events: none; }

  .pokeball {
    position: relative;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background:
      linear-gradient(to bottom,
        #ee1515 0%, #c41010 49%,
        #1a1a1a 49%, #1a1a1a 54%,
        #f5f5f5 54%, #d4d4d4 100%);
    box-shadow:
      inset -12px -12px 18px rgba(0, 0, 0, 0.25),
      inset 10px 10px 14px rgba(255, 255, 255, 0.4),
      0 8px 16px rgba(0, 0, 0, 0.4);
    transition: transform 0.2s;
  }
  .ball-stage:hover .pokeball { transform: scale(1.08); }

  .pokeball::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 28px;
    height: 28px;
    background: radial-gradient(circle at 35% 35%, #fff 0%, #d4d4d4 100%);
    border: 4px solid #1a1a1a;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.3);
    z-index: 2;
  }

  .pokeball::before {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 26px;
    font-weight: 900;
    font-family: Arial, sans-serif;
    z-index: 1;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    line-height: 1;
  }

  /* スーパーボール */
  .pokeball.super {
    background:
      linear-gradient(to bottom,
        #5fa3ee 0%, #2874a6 49%,
        #1a1a1a 49%, #1a1a1a 54%,
        #f5f5f5 54%, #d4d4d4 100%);
  }
  .pokeball.super::before { content: 'S'; color: #ff5252; }

  /* ハイパーボール */
  .pokeball.hyper {
    background:
      linear-gradient(to bottom,
        #4a4a4a 0%, #1a1a1a 49%,
        #1a1a1a 49%, #1a1a1a 54%,
        #f5f5f5 54%, #d4d4d4 100%);
  }
  .pokeball.hyper::before { content: 'H'; color: #ffd54a; }

  /* マスターボール */
  .pokeball.master {
    background:
      linear-gradient(to bottom,
        #b06ad8 0%, #6c3483 49%,
        #1a1a1a 49%, #1a1a1a 54%,
        #f5f5f5 54%, #d4d4d4 100%);
  }
  .pokeball.master::before { content: 'M'; color: #ffb0c5; }

  /* === フラッシュ === */
  .flash {
    position: absolute;
    inset: -80px;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.7) 30%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    border-radius: 50%;
  }
  .flash.flashing { animation: flash 0.5s ease-out; }
  @keyframes flash {
    0%   { opacity: 0; }
    30%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* === ボールラベル === */
  .ball-label {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    height: 22px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .ball-label.show { opacity: 1; }
  .ball-label.master { color: #ffb0c5; }
  .ball-label.hyper  { color: #ffd54a; }
  .ball-label.super  { color: #5fa3ee; }

  /* === 投擲・振動・開封アニメーション === */
  .pokeball.throwing {
    animation: throw 0.7s cubic-bezier(0.4, 0.0, 0.6, 1.0);
  }
  @keyframes throw {
    0%   { transform: translate(-280px, -240px) rotate(0deg) scale(0.4); opacity: 0; }
    15%  { opacity: 1; }
    70%  { transform: translate(0, 0) rotate(900deg) scale(1); opacity: 1; }
    85%  { transform: translate(0, -12px) rotate(900deg); }
    100% { transform: translate(0, 0) rotate(900deg); }
  }

  .pokeball.shaking {
    animation: shake 0.4s ease-in-out;
  }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(-18deg); }
    75%      { transform: rotate(18deg); }
  }

  .pokeball.opening {
    animation: opening 0.4s ease-out forwards;
  }
  @keyframes opening {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3); filter: brightness(2); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  /* === カード === */
  .card {
    width: 320px;
    height: 460px;
    border-radius: 18px;
    padding: 14px;
    background: linear-gradient(145deg, #ffd54a 0%, #ffb300 50%, #ff8f00 100%);
    box-shadow:
      0 0 0 3px #8b5e00,
      0 12px 24px rgba(0, 0, 0, 0.4),
      inset 0 2px 4px rgba(255, 255, 255, 0.5);
    user-select: none;
    display: flex;
    flex-direction: column;
    transform-origin: center top;
  }
  .card.hidden {
    transform: scale(0);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .card.popping {
    animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1.0);
  }
  @keyframes pop {
    0%   { transform: scale(0) translateY(-200px); opacity: 0; }
    60%  { transform: scale(1.05) translateY(0); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .card-inner {
    flex: 1;
    background: #fffbea;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    border: 2px solid #c98e00;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .name {
    font-size: 22px;
    font-weight: bold;
    color: #222;
    text-transform: capitalize;
  }

  .hp {
    font-size: 16px;
    color: #d32f2f;
    font-weight: bold;
  }

  .image-frame {
    background: linear-gradient(180deg, #b3e5fc 0%, #e1f5fe 100%);
    border: 3px solid #c98e00;
    border-radius: 8px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .image-frame img {
    width: 90%;
    height: 90%;
    object-fit: contain;
  }

  .types {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .type {
    padding: 4px 12px;
    border-radius: 12px;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
  }

  .stats {
    margin-top: 12px;
    padding: 8px;
    background: #f5f5f5;
    border-radius: 6px;
    font-size: 13px;
    color: #333;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .footer {
    margin-top: auto;
    padding-top: 8px;
    font-size: 10px;
    color: #888;
    text-align: center;
    font-style: italic;
  }

  .hint {
    color: #fff;
    font-size: 14px;
    opacity: 0.8;
  }

  /* タイプ色 */
  .type-normal{background:#A8A878}.type-fire{background:#F08030}
  .type-water{background:#6890F0}.type-electric{background:#F8D030;color:#333;text-shadow:none}
  .type-grass{background:#78C850}.type-ice{background:#98D8D8;color:#333;text-shadow:none}
  .type-fighting{background:#C03028}.type-poison{background:#A040A0}
  .type-ground{background:#E0C068;color:#333;text-shadow:none}.type-flying{background:#A890F0}
  .type-psychic{background:#F85888}.type-bug{background:#A8B820}
  .type-rock{background:#B8A038}.type-ghost{background:#705898}
  .type-dragon{background:#7038F8}.type-dark{background:#705848}
  .type-steel{background:#B8B8D0;color:#333;text-shadow:none}.type-fairy{background:#EE99AC}
</style>
</head>
<body>
  <h1>POKEMON CAPTURE!</h1>

  <div class="ball-stage" id="ballStage">
    <div class="pokeball" id="pokeball"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="ball-label" id="ballLabel"></div>

  <div class="card hidden" id="card">
    <div class="card-inner">
      <div class="card-header">
        <div class="name" id="name">？？？</div>
        <div class="hp" id="hp">HP --</div>
      </div>
      <div class="image-frame">
        <img id="img" src="" alt="">
      </div>
      <div class="types" id="types"></div>
      <div class="stats" id="stats"></div>
      <div class="footer">No.<span id="num">---</span></div>
    </div>
  </div>

  <p class="hint" id="hint">ボールをクリックで投げる！</p>

<script>
  const ballStage = document.getElementById('ballStage');
  const pokeball = document.getElementById('pokeball');
  const flash = document.getElementById('flash');
  const ballLabel = document.getElementById('ballLabel');
  const card = document.getElementById('card');
  const nameEl = document.getElementById('name');
  const hpEl = document.getElementById('hp');
  const imgEl = document.getElementById('img');
  const typesEl = document.getElementById('types');
  const statsEl = document.getElementById('stats');
  const numEl = document.getElementById('num');
  const hint = document.getElementById('hint');

  const MAX_ID = 151;
  const MASTER_IDS = [150, 151];   // ミュウツー、ミュウ
  const HYPER_IDS  = [144, 145, 146]; // フリーザー、サンダー、ファイヤー

  const BALL_INFO = {
    normal: { name: 'モンスターボール',    cls: '' },
    super:  { name: 'スーパーボール！',    cls: 'super' },
    hyper:  { name: 'ハイパーボール！！',  cls: 'hyper' },
    master: { name: 'マスターボール！！！', cls: 'master' },
  };

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function fetchPokemon(id) {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    const data = await res.json();
    const speciesRes = await fetch(data.species.url);
    const species = await speciesRes.json();
    const jaName = species.names.find(n => n.language.name === 'ja')?.name || data.name;
    return { data, species, jaName };
  }

  function determineBallType(data, species) {
    if (MASTER_IDS.includes(data.id)) return 'master';
    if (HYPER_IDS.includes(data.id))  return 'hyper';
    if (species.evolves_from_species) return 'super';
    return 'normal';
  }

  function setBall(type) {
    pokeball.className = 'pokeball';
    ballLabel.className = 'ball-label';
    const info = BALL_INFO[type];
    if (info.cls) {
      pokeball.classList.add(info.cls);
      ballLabel.classList.add(info.cls);
    }
    ballLabel.textContent = info.name;
  }

  function renderPokemon({ data, jaName }) {
    nameEl.textContent = jaName;
    numEl.textContent = String(data.id).padStart(4, '0');

    const hp = data.stats.find(s => s.stat.name === 'hp')?.base_stat || 0;
    hpEl.textContent = `HP ${hp}`;

    imgEl.src = data.sprites.other['official-artwork']?.front_default
              || data.sprites.front_default
              || '';

    typesEl.innerHTML = '';
    data.types.forEach(t => {
      const span = document.createElement('span');
      span.className = `type type-${t.type.name}`;
      span.textContent = t.type.name;
      typesEl.appendChild(span);
    });

    const atk = data.stats.find(s => s.stat.name === 'attack')?.base_stat || 0;
    const def = data.stats.find(s => s.stat.name === 'defense')?.base_stat || 0;
    const spd = data.stats.find(s => s.stat.name === 'speed')?.base_stat || 0;
    statsEl.innerHTML = `
      <div class="stat-row"><span>こうげき</span><span>${atk}</span></div>
      <div class="stat-row"><span>ぼうぎょ</span><span>${def}</span></div>
      <div class="stat-row"><span>すばやさ</span><span>${spd}</span></div>
    `;
  }

  async function drawPokemon() {
    ballStage.classList.add('locked');
    hint.style.opacity = '0';

    // 既存カードを隠す
    card.classList.remove('popping');
    card.classList.add('hidden');
    ballLabel.classList.remove('show');

    // ボールをデフォルトに戻す
    pokeball.className = 'pokeball';

    const id = Math.floor(Math.random() * MAX_ID) + 1;
    const dataPromise = fetchPokemon(id).catch(e => { console.error(e); return null; });

    const result = await dataPromise;
    if (!result) {
      ballLabel.textContent = '通信エラー';
      ballLabel.classList.add('show');
      ballStage.classList.remove('locked');
      hint.style.opacity = '0.8';
      return;
    }

    const ballType = determineBallType(result.data, result.species);

    // ボール反映＋ラベル表示
    setBall(ballType);
    ballLabel.classList.add('show');

    // 投擲
    pokeball.classList.add('throwing');
    await sleep(700);
    pokeball.classList.remove('throwing');

    // 揺れる × 2
    pokeball.classList.add('shaking');
    await sleep(400);
    pokeball.classList.remove('shaking');
    await sleep(80);
    pokeball.classList.add('shaking');
    await sleep(400);
    pokeball.classList.remove('shaking');

    // 開く＋フラッシュ
    pokeball.classList.add('opening');
    flash.classList.add('flashing');

    // カード登場
    renderPokemon(result);
    card.classList.remove('hidden');
    card.classList.add('popping');

    await sleep(600);
    pokeball.classList.remove('opening');
    flash.classList.remove('flashing');
    ballStage.classList.remove('locked');
    hint.textContent = 'もう一度クリック！';
    hint.style.opacity = '0.8';
  }

  ballStage.addEventListener('click', drawPokemon);
  card.addEventListener('click', drawPokemon);
  drawPokemon();
</script>
</body>
</html>
